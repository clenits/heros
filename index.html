<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heros DOS Web</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main class="layout">
      <header class="header">
        <h1>KOEI DOS Web Runner</h1>
        <p>실행할 게임을 선택하면 바로 시작됩니다.</p>
      </header>
      <section id="selector" class="selector">
        <button class="selector__button" data-game-id="heros" type="button">
          영걸전
        </button>
        <button class="selector__button" data-game-id="sam4pk" type="button">
          삼국지4PK
        </button>
      </section>
      <section id="play-area" class="play-area hidden">
        <section id="screen" class="screen">
          <canvas id="game-canvas"></canvas>
        </section>
        <section id="mobile-controls" class="mobile-controls">
          <div class="dpad">
            <button class="vkey vkey--arrow" data-key="ArrowUp" type="button">
              ↑
            </button>
            <button class="vkey vkey--arrow" data-key="ArrowLeft" type="button">
              ←
            </button>
            <button class="vkey vkey--arrow" data-key="ArrowDown" type="button">
              ↓
            </button>
            <button class="vkey vkey--arrow" data-key="ArrowRight" type="button">
              →
            </button>
          </div>
          <div class="action-pad">
            <button class="vkey" data-mouse="left" type="button">좌클릭</button>
            <button class="vkey" data-mouse="right" type="button">우클릭</button>
            <button class="vkey" data-key="Enter" type="button">Enter</button>
            <button class="vkey" data-action="fullscreen" type="button">
              전체화면
            </button>
          </div>
        </section>
      </section>
      <section class="tips">
        <p>방향키는 숫자패드 2/4/6/8로 매핑됩니다.</p>
        <p>화면 버튼으로 좌/우클릭과 Enter를 사용할 수 있습니다.</p>
      </section>
      <p id="status" class="status">게임을 선택하세요.</p>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
